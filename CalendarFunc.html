<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persistent Table Popup with Expanded Colors</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f9f9f9; }

        /* Lock down entire table layout to exactly 2300px */
        table { 
            border-collapse: collapse; 
            margin: 20px auto; 
            table-layout: fixed; 
            width: 2300px;         
            max-width: 2300px;
            min-width: 2300px;
            background-color: white;
        }
        
        td { 
            border: 1px solid #333; 
            padding: 0; 
            cursor: pointer; 
            vertical-align: middle; 
        }
        /* Default alternating row style - overridden when custom colors are applied */
        tr:nth-child(even) td { background-color: #f2f2f2; } 
        td:hover { background-color: #e0e0e0 !important; }

        /* Absolute pixel size enforcement - set to default 80px */
        .cell-content {
            box-sizing: border-box;
            height: 80px;       
            max-height: 80px;
            min-height: 80px;
            padding: 2px 6px;
            overflow: hidden;   
            
            font-size: 11px;    
            line-height: 16px;
            white-space: pre-wrap;  
            word-break: break-all; 
        }

        /* NEW: Force 30px height strictly for rows 1, 2, and 3 */
        tr.row-1 .cell-content, 
        tr.row-2 .cell-content, 
        tr.row-3 .cell-content {
            height: 30px;
            min-height: 30px;
            max-height: 30px;
        }

        /* Default alignment for standard rows */
        tr td { text-align: left; }

        /* Align text center for the first three rows only */
        tr.row-1 td, tr.row-2 td, tr.row-3 td { 
            text-align: center; 
        }

        /* Column 1 Configuration (300px wide) */
        td.col-1 { width: 300px; max-width: 300px; min-width: 300px; }
        .cell-width-1 { width: 300px; font-weight: bold; }

        /* Columns 2-21 Configuration (100px wide) */
        td.col-rest { width: 100px; max-width: 100px; min-width: 100px; }
        .cell-width-rest { width: 100px; }

        /* Custom cell color definitions */
        .bg-white { background-color: #ffffff !important; color: #000000; }
        .bg-blue { background-color: #d1ecf1 !important; color: #0c5460; }
        .bg-grey { background-color: #e2e3e5 !important; color: #383d41; }
        .bg-yellow { background-color: #fff3cd !important; color: #856404; }
        .bg-orange { background-color: #ffe8d6 !important; color: #a75d00; }
        .bg-pink { background-color: #f8d7da !important; color: #721c24; }

        /* The Overlay (blocks page interaction) */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 100; 
            left: 0; 
            top: 0;
            width: 100%; 
            height: 100%;
            background-color: rgba(0,0,0,0.5); 
            align-items: center;
            justify-content: center;
        }

        /* The white popup box inside */
        .modal-content {
            background-color: white;
            padding: 25px;
            border: 1px solid #888;
            width: 400px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: left;
        }

        /* Input Labels */
        .modal-label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }

        /* Multiline Text Area Box */
        .modal-textarea {
            width: 95%;
            height: 100px; 
            padding: 10px;
            font-size: 16px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: none; 
            font-family: sans-serif;
        }

        /* Color Selection Dropdown */
        .modal-select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #fff;
        }

        /* Control Buttons */
        .btn {
            padding: 8px 16px;
            font-size: 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 0 5px;
        }
        .save-btn { background-color: #4CAF50; color: white; }
        .save-btn:hover { background-color: #45a049; }
        .cancel-btn { background-color: #f44336; color: white; }
        .cancel-btn:hover { background-color: #da190b; }
        
        /* Top Control Panel Styles */
        .control-panel {
            margin: 20px auto;
            padding: 15px;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 6px;
            display: inline-block;
        }
        .panel-btn {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 0 10px;
            color: white;
        }
        .export-btn { background-color: #007bff; }
        .export-btn:hover { background-color: #0069d9; }
        .import-btn { background-color: #17a2b8; }
        .import-btn:hover { background-color: #138496; }
    </style>
</head>
<body>





    <!-- Simple File Control Panel -->
    <div class="control-panel">
	<h2>BN-GIS FUNCTIONS Calender</h2>
    <p>Biweekly Sprints for Functions</p>
	
<!-- Optional: A small text element to visually show you when it last saved -->
<p id="save-status" style="color: gray; font-style: italic;">Status: Waiting for first auto-save...</p>



        <button class="panel-btn import-btn" onclick="document.getElementById('fileInput').click()">Load</button>
        <input type="file" id="fileInput" accept=".json" style="display: none;" onchange="loadDataFromFile(event)">
    </div>



	<!-- NEW: Invisible wrapper to hold the top scrollbar -->
    <div id="topScrollbarWrapper" style="overflow-x: auto; overflow-y: hidden; max-width: 95vw; margin: 0 auto; height: 20px;">
        <!-- This dummy div is forced to match your table's exact 2300px width -->
        <div style="width: 2300px; height: 1px;"></div>
    </div>

    <div id="tableWrapper" style="overflow-x: auto; max-width: 100%; border: 1px solid #ccc;">
        <table id="gridTable">
            <!-- Rows generated dynamically via JavaScript -->
        </table>
    </div>
	
	
    <div style="overflow-x: auto; max-width: 100%; border: 1px solid #ccc;">
        <table id="gridTable">
            <!-- Rows generated dynamically via JavaScript -->
        </table>
    </div>

    <!-- The Editable Popup Modal -->
    <div id="myModal" class="modal">
        <div class="modal-content">
            <h3>Edit Cell Properties</h3>
            
            <label class="modal-label" for="popupInput">Cell Text Content:</label>
            <textarea id="popupInput" class="modal-textarea"></textarea>
            
            <label class="modal-label" for="colorSelect">Cell Background Color:</label>
            <select id="colorSelect" class="modal-select">
                <option value="white">White</option>
                <option value="blue">Blue</option>
                <option value="grey">Grey</option>
                <option value="yellow">Yellow</option>
                <option value="orange">Orange</option>
                <option value="pink">Pink</option>
            </select>
            
            <div>
                <button class="btn save-btn" onclick="saveChanges()">Save</button>
                <button class="btn cancel-btn" onclick="closePopup()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const totalRows = 34;
        const totalCols = 21;
        const tableBody = document.getElementById("gridTable");
        
        // In-memory data runtime state (replaces localStorage)
        let runtimeGridData = {};

        // Build grid system with IDs identifying rows and columns
        for (let r = 1; r <= totalRows; r++) {
            const tr = document.createElement("tr");
            
            if (r <= 3) {
                tr.className = `row-${r}`;
            }

            // Column 1 setup
            const td1 = document.createElement("td");
            td1.className = "col-1";
            td1.setAttribute("data-cell-id", `r${r}-c1`);
            td1.innerHTML = `<div class="cell-content cell-width-1"></div>`;
            tr.appendChild(td1);

            // Columns 2 to 21 setup
            for (let c = 2; c <= totalCols; c++) {
                const tdRest = document.createElement("td");
                tdRest.className = "col-rest";
                tdRest.setAttribute("data-cell-id", `r${r}-c${c}`);
                tdRest.innerHTML = `<div class="cell-content cell-width-rest"></div>`;
                tr.appendChild(tdRest);
            }

            tableBody.appendChild(tr);
        }

        // Replace this URL with your actual deployed Google Script Web App URL
          var webAppUrl = 'https://script.google.com/macros/s/AKfycb..._YOUR_WEB_APP_URL.../exec';
  
        window.addEventListener('DOMContentLoaded', () => {
            fetch('grid-data.json') 
                .then(response => {
                    if (!response.ok) throw new Error("File not found");
                    return response.json();
                })
                .then(parsedData => {
                    runtimeGridData = parsedData; 
                    applyDataToGrid(runtimeGridData);
                    console.log("Data loaded automatically!");
                })
                .catch(error => {
                    console.log("No initial data file found, starting with a clean grid:", error);
                });
        });



        // Logic for Handling Popups
        let activeContentDiv = null; 
        let activeCellTd = null;
        const modal = document.getElementById("myModal");
        const colorSelect = document.getElementById("colorSelect");

        tableBody.addEventListener("click", function(event) {
            const clickedDiv = event.target.closest(".cell-content");
            if (clickedDiv) {
                activeContentDiv = clickedDiv; 
                activeCellTd = clickedDiv.closest("td"); 
                
                // Read text value
                document.getElementById("popupInput").value = clickedDiv.textContent; 
                
                // Detect current applied class color to set dropdown initial value
                if (activeCellTd.classList.contains("bg-blue")) colorSelect.value = "blue";
                else if (activeCellTd.classList.contains("bg-grey")) colorSelect.value = "grey";
                else if (activeCellTd.classList.contains("bg-yellow")) colorSelect.value = "yellow";
                else if (activeCellTd.classList.contains("bg-orange")) colorSelect.value = "orange";
                else if (activeCellTd.classList.contains("bg-pink")) colorSelect.value = "pink";
                else colorSelect.value = "white";

                // Show modal overlay
                modal.style.display = "flex";
            }
        });

        // Function to close the popup overlay
        function closePopup() {
            modal.style.display = "none";
            activeContentDiv = null;
            activeCellTd = null;
        }

        // Function to save configuration choices back into the grid and update runtime state
        function saveChanges() {
            if (activeContentDiv && activeCellTd) {
                const textValue = document.getElementById("popupInput").value;
                const selectedColor = colorSelect.value;

                // Update UI text content
                activeContentDiv.textContent = textValue;

                // Clear out existing color classes
                activeCellTd.classList.remove("bg-white", "bg-blue", "bg-grey", "bg-yellow", "bg-orange", "bg-pink");

                // Assign the newly selected color option class
                if (selectedColor !== "white") {
                    activeCellTd.classList.add(`bg-${selectedColor}`);
                } else {
                    activeCellTd.classList.add("bg-white");
                }

                // Update structural data object state in RAM
                const cellId = activeCellTd.getAttribute("data-cell-id");
                runtimeGridData[cellId] = { text: textValue, color: selectedColor };
            }
            closePopup();
        }


        // Reads a selected local text file and paints the states onto the active DOM grid
        function loadDataFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsedData = JSON.parse(e.target.result);
                    runtimeGridData = parsedData; // Sync memory object
                    applyDataToGrid(runtimeGridData);
                } catch (error) {
                    alert("Failed to parse file. Make sure it's a valid grid JSON file.");
                }
            };
            reader.readAsText(file);
            
            // Clear input value so same file can be loaded again if desired
            event.target.value = '';
        }

        // Helper function to paint structural configurations onto UI cells
        function applyDataToGrid(dataObject) {
            // First, clear current visual styles out of all cells to avoid overlaps
            document.querySelectorAll("#gridTable td").forEach(td => {
                const content = td.querySelector(".cell-content");
                if (content) content.textContent = "";
                td.classList.remove("bg-white", "bg-blue", "bg-grey", "bg-yellow", "bg-orange", "bg-pink");
            });

            // Loop and render imported settings
            Object.keys(dataObject).forEach(cellId => {
                const cellElement = document.querySelector(`[data-cell-id="${cellId}"]`);
                if (cellElement) {
                    const contentDiv = cellElement.querySelector(".cell-content");
                    const dataRecord = dataObject[cellId];

                    if (contentDiv) contentDiv.textContent = dataRecord.text;

                    if (dataRecord.color && dataRecord.color !== "white") {
                        cellElement.classList.add(`bg-${dataRecord.color}`);
                    } else {
                        cellElement.classList.add("bg-white");
                    }
                }
            });
        }

        // Close window interface if user clicks outside modal boundary layout
        window.addEventListener("click", function(event) {
            if (event.target === modal) {
                closePopup();
            }
        });
    </script>
